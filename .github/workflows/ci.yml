name: Primer Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  verificar-html:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Verificar que existe index.html
        run: test -f index.html

      - name: Mostrar mensaje final
        run: echo "El pipeline se ejecutó correctamente"