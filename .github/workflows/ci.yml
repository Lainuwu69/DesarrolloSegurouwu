name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + Analisis de Seguridad
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: pytest tests/ -v

      - name: Analisis de seguridad con Bandit
        run: |
          pip install bandit
          bandit -r . -ll -ii --exclude ./tests,./venv

  deploy-dev:
    name: Deploy a Desarrollo
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy a Dev en Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEV_HOOK }}"
          echo "Deploy a Dev disparado"

      - name: Esperar que Render inicie
        run: sleep 60

  smoke-test:
    name: Smoke Test en Dev
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: Verificar que Dev responde
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://desarrollosegurouwu-dev.onrender.com/health)
            if [ "$STATUS" -eq 200 ]; then
              echo "Dev responde correctamente con HTTP $STATUS"
              exit 0
            fi
            echo "Intento $i fallido con HTTP $STATUS. Reintentando..."
            sleep 15
          done
          echo "Dev no responde despues de 5 intentos"
          exit 1

  deploy-prod:
    name: Deploy a Produccion
    needs: smoke-test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy a Prod en Render
        run: |
          curl -X POST "${{ secrets.RENDER_PROD_HOOK }}"
          echo "Deploy a Produccion disparado"